<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta name="google-site-verification" content="Za1pEupQLM-LlPnODka_5pMgrC6DyOzmuDaZBepfg7Q" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>N-Store | Next Gen App & Game Hub</title>
    <meta name="description" content="N-Store: Dynamic app store with realtime updates, ratings, wishlist, and offline play.">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        :root {
            --bg-main: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-sub: #64748b;
            --primary: #10b981; --primary-hover: #059669; --primary-light: #d1fae5;
            --border: #e2e8f0; --hover-bg: #f1f5f9; --nav-bg: rgba(255,255,255,0.85);
            --card-shadow: 0 4px 20px rgba(0,0,0,0.03); --card-hover-shadow: 0 12px 25px rgba(0,0,0,0.08);
            --popup-bg: rgba(255,255,255,0.95); --danger: #ef4444; --star: #fbbf24;
        }
        [data-theme="dark"] {
            --bg-main: #0f172a; --surface: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8;
            --primary: #10b981; --primary-hover: #34d399; --primary-light: rgba(16,185,129,0.15);
            --border: #334155; --hover-bg: #334155; --nav-bg: rgba(30,41,59,0.85);
            --card-shadow: 0 4px 20px rgba(0,0,0,0.2); --card-hover-shadow: 0 12px 30px rgba(0,0,0,0.4);
            --popup-bg: rgba(30,41,59,0.95);
        }
        body { background: var(--bg-main); color: var(--text-main); transition: all 0.3s; overflow-x: hidden; }
        nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; position: sticky; top: 0; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; cursor: pointer; }
        .search-bar { background: var(--hover-bg); border-radius: 30px; display: flex; align-items: center; padding: 12px 24px; width: 40%; max-width: 500px; transition: all 0.3s; border: 1px solid transparent; }
        .search-bar:focus-within { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 4px var(--primary-light); }
        .search-bar input { background: transparent; border: none; outline: none; width: 100%; color: var(--text-main); margin-left: 14px; }
        .theme-btn, .action-icon { background: var(--surface); border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: var(--text-main); }
        .theme-btn:hover, .action-icon:hover { background: var(--hover-bg); transform: scale(1.05); }
        .tabs { display: flex; gap: 32px; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; }
        .tab { padding: 18px 0; font-weight: 600; color: var(--text-sub); cursor: pointer; position: relative; white-space: nowrap; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 4px; }
        .container { max-width: 1280px; margin: 0 auto; padding: 40px 28px; }
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 30px; flex-wrap: wrap; gap: 12px; }
        .section-title { font-size: 24px; font-weight: 700; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
        .app-card { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); padding: 20px; transition: all 0.3s; box-shadow: var(--card-shadow); position: relative; animation: fadeInUp 0.4s ease; }
        .app-card:hover { transform: translateY(-6px); box-shadow: var(--card-hover-shadow); }
        .app-icon { width: 80px; height: 80px; margin: 0 auto 16px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; box-shadow: 0 8px 16px rgba(0,0,0,0.1); transition: 0.2s; overflow: hidden; }
        .app-card:hover .app-icon { transform: scale(1.02); }
        .app-title { font-weight: 800; font-size: 16px; text-align: center; margin-top: 8px; }
        .app-dev { font-size: 12px; color: var(--text-sub); text-align: center; }
        .app-meta { display: flex; justify-content: center; align-items: center; gap: 12px; margin: 8px 0; font-size: 13px; font-weight: 600; }
        .stars { color: var(--star); letter-spacing: 2px; }
        .card-actions { display: flex; justify-content: space-between; gap: 8px; margin-top: 12px; }
        .install-btn, .preview-btn { background: var(--primary-light); border: none; padding: 8px; border-radius: 40px; font-weight: 700; font-size: 13px; cursor: pointer; color: var(--primary); flex: 1; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .install-btn:hover, .preview-btn:hover { background: var(--primary); color: white; }
        .fav-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-sub); transition: 0.2s; width: 36px; border-radius: 50%; }
        .fav-btn.active { color: #ef4444; }
        .share-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-sub); }
        /* modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-card { background: var(--surface); max-width: 450px; width: 90%; border-radius: 32px; padding: 24px; border: 1px solid var(--border); }
        .rating-stars { display: flex; gap: 12px; justify-content: center; margin: 20px 0; font-size: 32px; cursor: pointer; color: #cbd5e1; }
        .rating-stars i.active { color: var(--star); }
        textarea { width: 100%; padding: 12px; border-radius: 20px; background: var(--hover-bg); border: 1px solid var(--border); color: var(--text-main); margin: 12px 0; }
        .bottom-nav { display: none; position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(12px); justify-content: space-around; padding: 12px 0; z-index: 99; border-top: 1px solid var(--border); }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; cursor: pointer; color: var(--text-sub); }
        .bottom-nav-item.active { color: var(--primary); }
        .recent-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px; }
        .recent-grid { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 12px; }
        .recent-chip { background: var(--surface); border-radius: 40px; padding: 8px 20px; white-space: nowrap; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .chat-toggle-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; border: none; box-shadow: 0 8px 20px rgba(16,185,129,0.4); cursor: pointer; z-index: 1000; }
        .chat-window { position: fixed; bottom: 100px; right: 30px; width: 360px; height: 500px; background: var(--surface); border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 1001; display: flex; flex-direction: column; transform: scale(0.9); opacity: 0; pointer-events: none; transition: 0.2s; border: 1px solid var(--border); }
        .chat-window.active { transform: scale(1); opacity: 1; pointer-events: all; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .search-bar { width: 100%; order: 3; } .bottom-nav { display: flex; } .container { padding-bottom: 100px; } .app-grid { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); } .chat-window { width: 90%; right: 5%; bottom: 90px; } }
    </style>
</head>
<body>

<nav>
    <div class="logo-area" onclick="filterCategory('All')"><i class="fa-brands fa-google-play" style="color:var(--primary)"></i><span>N-Store</span></div>
    <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Fuzzy search apps..."></div>
    <div class="nav-actions" style="display:flex; gap:10px">
        <div id="auth-section" style="display:flex; gap:8px; align-items:center">
            <button id="loginBtn" class="theme-btn" style="width:auto; padding:0 16px; border-radius:22px"><i class="fa-brands fa-google"></i> Login</button>
            <div id="userProfile" style="display:none; align-items:center; gap:8px"><img id="userPhoto" width="38" height="38" style="border-radius:50%; border:2px solid var(--primary)"><button id="logoutBtn" class="theme-btn"><i class="fa-solid fa-sign-out-alt"></i></button></div>
        </div>
        <button class="theme-btn" id="themeToggle"><i class="fa-regular fa-moon"></i></button>
    </div>
</nav>

<div class="tabs" id="tabsContainer">
    <div class="tab active" data-cat="All">For you</div>
    <div class="tab" data-cat="Top charts">Top charts</div>
    <div class="tab" data-cat="Game">Games</div>
    <div class="tab" data-cat="App">Apps</div>
    <div class="tab" data-cat="Library">My Library</div>
</div>

<div class="container">
    <div class="section-header"><h2 class="section-title" id="sectionTitle">🔥 Trending Now</h2></div>
    <div class="app-grid" id="projectGrid"></div>
    
    <div class="recent-section" id="recentSection" style="display:none">
        <h3 style="margin-bottom:16px"><i class="fa-solid fa-clock-rotate-left"></i> Recently Played</h3>
        <div class="recent-grid" id="recentGrid"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="bottom-nav-item" data-cat="Game"><i class="fa-solid fa-gamepad fa-lg"></i><span>Games</span></div>
    <div class="bottom-nav-item" data-cat="App"><i class="fa-solid fa-layer-group fa-lg"></i><span>Apps</span></div>
    <div class="bottom-nav-item" data-cat="Library"><i class="fa-solid fa-heart"></i><span>Library</span></div>
    <div class="bottom-nav-item" onclick="document.getElementById('searchInput').focus()"><i class="fa-solid fa-search"></i><span>Search</span></div>
</div>

<!-- Rating Modal -->
<div id="ratingModal" class="modal">
    <div class="modal-card"><h3>Rate this app</h3><div class="rating-stars" id="ratingStars"><i class="fa-regular fa-star" data-val="1"></i><i class="fa-regular fa-star" data-val="2"></i><i class="fa-regular fa-star" data-val="3"></i><i class="fa-regular fa-star" data-val="4"></i><i class="fa-regular fa-star" data-val="5"></i></div><textarea id="reviewText" placeholder="Write your review (optional)"></textarea><div style="display:flex; gap:12px"><button id="submitRatingBtn" class="install-btn" style="background:var(--primary); color:white">Submit</button><button id="closeRatingBtn" class="install-btn">Cancel</button></div></div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal"><div class="modal-card" style="max-width:90%; width:800px; height:70vh"><iframe id="previewFrame" style="width:100%; height:100%; border:none; border-radius:20px"></iframe><button id="closePreviewBtn" style="margin-top:16px; width:100%" class="install-btn">Close</button></div></div>

<button class="chat-toggle-btn" id="chatToggleBtn"><i class="fa-regular fa-comment-dots"></i><span id="chatBadge" style="position:absolute; top:0; right:0; background:#ef4444; width:12px; height:12px; border-radius:50%; display:none"></span></button>
<div class="chat-window" id="chatWindow"><div class="chat-header" style="padding:16px; background:var(--primary); color:white; display:flex; justify-content:space-between"><span>Global Lounge</span><button id="chatCloseBtn" style="background:none; border:none; color:white; font-size:20px">&times;</button></div><div id="chatMessages" style="flex:1; overflow-y:auto; padding:16px"></div><div style="padding:12px; display:flex; gap:8px"><input id="chatInput" placeholder="Message" style="flex:1; padding:10px; border-radius:40px; border:1px solid var(--border)" disabled><button id="chatSendBtn" disabled class="install-btn">Send</button></div><div id="chatLoginOverlay" style="position:absolute; inset:0; background:var(--popup-bg); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px"><button id="chatOverlayLoginBtn" class="install-btn">Login to Chat</button></div></div>

<script type="importmap">
    { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js", "firebase/database": "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js" } }
</script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "firebase/auth";
    import { getDatabase, ref, push, onValue, set, update, remove, get, child, serverTimestamp, increment, query, orderByChild, limitToLast } from "firebase/database";

    const firebaseConfig = { apiKey: "AIzaSyCIfn-tI5koy-ZZOWrErlrNDd6kWN2AsKA", authDomain: "n-store-bad6b.firebaseapp.com", projectId: "n-store-bad6b", storageBucket: "n-store-bad6b.firebasestorage.app", messagingSenderId: "431750611629", appId: "1:431750611629:web:07d1941c9782fb3d48fc24" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let allApps = []; let favoriteIds = new Set(); let fuse = null; let currentFilter = "All";

    // DOM elements
    const gridEl = document.getElementById("projectGrid");
    const searchInput = document.getElementById("searchInput");
    const sectionTitleEl = document.getElementById("sectionTitle");
    const recentSection = document.getElementById("recentSection");
    const recentGrid = document.getElementById("recentGrid");
    
    // Helper: render apps with sorting/filter
    function renderApps() {
        let filtered = [...allApps];
        const searchTerm = searchInput.value.trim();
        if (searchTerm && fuse) filtered = fuse.search(searchTerm).map(r => r.item);
        if (currentFilter === "Game") filtered = filtered.filter(a => a.category === "Game");
        else if (currentFilter === "App") filtered = filtered.filter(a => a.category === "App");
        else if (currentFilter === "Library" && currentUser) filtered = filtered.filter(a => favoriteIds.has(a.id));
        else if (currentFilter === "Top charts") filtered.sort((a,b) => (b.playCount || 0) - (a.playCount || 0));
        
        if (filtered.length === 0) { gridEl.innerHTML = `<div class="no-results">✨ Nothing found ✨</div>`; return; }
        
        gridEl.innerHTML = filtered.map(app => `
            <div class="app-card" data-id="${app.id}">
                <div class="app-icon" style="background: ${app.iconBg || '#10b981'}">${app.iconImg ? `<img src="${app.iconImg}" style="width:100%; height:100%; object-fit:cover">` : `<i class="${app.iconClass || 'fa-solid fa-cube'}"></i>`}</div>
                <div class="app-title">${app.title}</div>
                <div class="app-dev">${app.developer || 'N-Store'}</div>
                <div class="app-meta"><span class="stars">${renderStars(app.avgRating || 4.5)}</span> ${(app.avgRating || 4.5).toFixed(1)} (${app.totalRatings || 0})</div>
                <div class="card-actions">
                    <button class="install-btn play-btn" data-link="${app.link}"><i class="fa-solid fa-play"></i> Play</button>
                    <button class="preview-btn preview-trigger" data-link="${app.link}"><i class="fa-regular fa-eye"></i></button>
                    <button class="fav-btn ${favoriteIds.has(app.id) ? 'active' : ''}" data-id="${app.id}"><i class="fa-${favoriteIds.has(app.id) ? 'solid' : 'regular'} fa-heart"></i></button>
                    <button class="share-btn" data-title="${app.title}" data-link="${app.link}"><i class="fa-solid fa-share-nodes"></i></button>
                </div>
            </div>
        `).join("");
        attachCardEvents();
    }
    
    function renderStars(rating) { let full = Math.floor(rating); let half = rating % 1 >= 0.5; let s = ""; for(let i=0;i<full;i++) s+="<i class='fa-solid fa-star'></i>"; if(half) s+="<i class='fa-solid fa-star-half-alt'></i>"; while(s.length/24 <5) s+="<i class='fa-regular fa-star'></i>"; return s; }
    
    function attachCardEvents() {
        document.querySelectorAll(".play-btn").forEach(btn => btn.addEventListener("click", async (e) => { e.preventDefault(); const link = btn.dataset.link; const card = btn.closest(".app-card"); const appId = card.dataset.id; const app = allApps.find(a=>a.id===appId); if(app && currentUser) { await update(ref(db, `apps/${appId}`), { playCount: increment(1) }); trackRecentlyPlayed(app); } window.open(link, '_blank'); canvasConfetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#10b981'] }); }));
        document.querySelectorAll(".fav-btn").forEach(btn => btn.addEventListener("click", async (e) => { e.stopPropagation(); const appId = btn.dataset.id; if(!currentUser) { alert("Login to add to library"); return; } const isFav = favoriteIds.has(appId); if(isFav) { await remove(ref(db, `users/${currentUser.uid}/favorites/${appId}`)); favoriteIds.delete(appId); } else { await set(ref(db, `users/${currentUser.uid}/favorites/${appId}`), true); favoriteIds.add(appId); } renderApps(); }));
        document.querySelectorAll(".share-btn").forEach(btn => btn.addEventListener("click", () => { const title = btn.dataset.title; const link = btn.dataset.link; if(navigator.share) navigator.share({ title, text: `Check out ${title} on N-Store`, url: link }); else { prompt("Share this link", link); } }));
        document.querySelectorAll(".preview-trigger").forEach(btn => btn.addEventListener("click", () => { const link = btn.dataset.link; document.getElementById("previewFrame").src = link; document.getElementById("previewModal").classList.add("active"); }));
    }
    
    function trackRecentlyPlayed(app) { let recent = JSON.parse(localStorage.getItem("recentlyPlayed") || "[]"); recent = recent.filter(id => id !== app.id); recent.unshift(app.id); recent = recent.slice(0, 5); localStorage.setItem("recentlyPlayed", JSON.stringify(recent)); renderRecentlyPlayed(); }
    function renderRecentlyPlayed() { const ids = JSON.parse(localStorage.getItem("recentlyPlayed") || "[]"); if(ids.length === 0) { recentSection.style.display = "none"; return; } const recentApps = ids.map(id => allApps.find(a=>a.id===id)).filter(Boolean); if(recentApps.length===0) return; recentSection.style.display = "block"; recentGrid.innerHTML = recentApps.map(app => `<div class="recent-chip" data-id="${app.id}"><i class="fa-regular fa-clock"></i> ${app.title}</div>`).join(""); document.querySelectorAll(".recent-chip").forEach(chip => chip.addEventListener("click", () => { const app = allApps.find(a=>a.id===chip.dataset.id); if(app) window.open(app.link,'_blank'); })); }
    
    // Firebase listeners for apps
    function loadApps() { onValue(ref(db, 'apps'), (snapshot) => { const data = snapshot.val(); allApps = data ? Object.entries(data).map(([id, val]) => ({ id, ...val, avgRating: val.avgRating || 4.5, totalRatings: val.totalRatings || 0, playCount: val.playCount || 0 })) : []; fuse = new Fuse(allApps, { keys: ['title', 'developer', 'category'], threshold: 0.3 }); renderApps(); renderRecentlyPlayed(); }); }
    
    // ratings modal logic
    let currentRatingAppId = null; let selectedRating = 0;
    const modal = document.getElementById("ratingModal");
    const stars = document.querySelectorAll("#ratingStars i");
    function openRatingModal(appId) { currentRatingAppId = appId; selectedRating = 0; stars.forEach(s => { s.className = "fa-regular fa-star"; }); modal.classList.add("active"); }
    stars.forEach(s => s.addEventListener("click", () => { selectedRating = parseInt(s.dataset.val); stars.forEach((star,i) => { if(i<selectedRating) star.className = "fa-solid fa-star"; else star.className = "fa-regular fa-star"; }); }));
    document.getElementById("submitRatingBtn").onclick = async () => { if(!currentUser) { alert("Login to rate"); modal.classList.remove("active"); return; } if(selectedRating===0) { alert("Select a star rating"); return; } const review = document.getElementById("reviewText").value; const ratingId = `${currentUser.uid}_${Date.now()}`; await push(ref(db, `apps/${currentRatingAppId}/ratings`), { userId: currentUser.uid, rating: selectedRating, comment: review, timestamp: serverTimestamp() }); await updateAvgRating(currentRatingAppId); modal.classList.remove("active"); document.getElementById("reviewText").value = ""; };
    document.getElementById("closeRatingBtn").onclick = () => modal.classList.remove("active");
    async function updateAvgRating(appId) { const ratingsSnap = await get(ref(db, `apps/${appId}/ratings`)); const ratings = ratingsSnap.val(); if(!ratings) return; let sum=0, count=0; Object.values(ratings).forEach(r => { if(r.rating){ sum+=r.rating; count++; } }); const avg = count? sum/count : 4.5; await update(ref(db, `apps/${appId}`), { avgRating: avg, totalRatings: count }); }
    
    // Favorites listener
    function listenFavorites() { if(!currentUser) return; onValue(ref(db, `users/${currentUser.uid}/favorites`), (snap) => { favoriteIds.clear(); const data = snap.val(); if(data) Object.keys(data).forEach(id => favoriteIds.add(id)); renderApps(); }); }
    
    // Auth UI
    onAuthStateChanged(auth, (user) => { currentUser = user; if(user){ document.getElementById("loginBtn").style.display="none"; document.getElementById("userProfile").style.display="flex"; document.getElementById("userPhoto").src = user.photoURL || "https://via.placeholder.com/38"; listenFavorites(); } else { document.getElementById("loginBtn").style.display="flex"; document.getElementById("userProfile").style.display="none"; favoriteIds.clear(); renderApps(); } });
    document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
    document.getElementById("logoutBtn").onclick = () => signOut(auth);
    
    // Chat integration (preserve existing but add to module)
    const messagesRef = ref(db, 'global_chat'); const chatMessagesDiv = document.getElementById("chatMessages"); const chatInputEl = document.getElementById("chatInput"); const chatSend = document.getElementById("chatSendBtn"); const chatOverlay = document.getElementById("chatLoginOverlay");
    function appendMessage(msg, msgId, isMe) { const div = document.createElement("div"); div.className = `msg-row ${isMe ? 'me' : 'other'}`; div.id = `msg-${msgId}`; div.innerHTML = `<img src="${msg.photo || 'https://via.placeholder.com/32'}" style="width:32px;height:32px;border-radius:50%"><div><b>${msg.name?.split(' ')[0] || 'User'}</b><div class="msg-bubble">${msg.text}</div>${isMe ? `<button class="delete-msg-btn" data-id="${msgId}">🗑️</button>` : ''}</div>`; chatMessagesDiv.appendChild(div); chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight; }
    onValue(query(ref(db, 'global_chat'), limitToLast(50)), (snap) => { chatMessagesDiv.innerHTML = ""; const msgs = []; snap.forEach(child => { msgs.unshift({ id: child.key, ...child.val() }); }); msgs.forEach(msg => { const isMe = currentUser && msg.uid === currentUser.uid; appendMessage(msg, msg.id, isMe); }); });
    chatSend.onclick = () => { if(!currentUser) return; const text = chatInputEl.value.trim(); if(text) { push(messagesRef, { uid: currentUser.uid, name: currentUser.displayName, photo: currentUser.photoURL, text, timestamp: serverTimestamp() }); chatInputEl.value = ""; } };
    chatInputEl.addEventListener("keypress", e => { if(e.key==="Enter") chatSend.click(); });
    onAuthStateChanged(auth, (user) => { if(user){ chatOverlay.style.display="none"; chatInputEl.disabled=false; chatSend.disabled=false; } else { chatOverlay.style.display="flex"; chatInputEl.disabled=true; chatSend.disabled=true; } });
    document.getElementById("chatToggleBtn").onclick = () => document.getElementById("chatWindow").classList.toggle("active");
    document.getElementById("chatCloseBtn").onclick = () => document.getElementById("chatWindow").classList.remove("active");
    document.getElementById("chatOverlayLoginBtn").onclick = () => signInWithPopup(auth, provider);
    chatMessagesDiv.addEventListener("click", async (e) => { const del = e.target.closest(".delete-msg-btn"); if(del && currentUser) { const msgId = del.dataset.id; const msgSnap = await get(ref(db, `global_chat/${msgId}`)); if(msgSnap.exists() && msgSnap.val().uid === currentUser.uid) { remove(ref(db, `global_chat/${msgId}`)); } } });
    
    // Theme & UI
    const themeBtn = document.getElementById("themeToggle"); const html = document.documentElement; themeBtn.onclick = () => { const newTheme = html.getAttribute("data-theme") === "light" ? "dark" : "light"; html.setAttribute("data-theme", newTheme); themeBtn.innerHTML = newTheme === "dark" ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-regular fa-moon"></i>'; };
    
    // Tabs logic
    document.querySelectorAll(".tab, .bottom-nav-item").forEach(el => { el.addEventListener("click", () => { const cat = el.dataset.cat; if(cat) { currentFilter = cat; sectionTitleEl.innerText = cat === "All" ? "🔥 For You" : cat === "Library" ? "📚 My Library" : cat === "Top charts" ? "🏆 Top Charts" : `✨ ${cat}s`; renderApps(); document.querySelectorAll(".tab, .bottom-nav-item").forEach(t => t.classList.remove("active")); document.querySelectorAll(`[data-cat="${cat}"]`).forEach(t => t.classList.add("active")); } }); });
    // fuzzy search
    searchInput.addEventListener("input", () => renderApps());
    // Preview modal close
    document.getElementById("closePreviewBtn").onclick = () => { document.getElementById("previewModal").classList.remove("active"); document.getElementById("previewFrame").src = ""; };
    document.getElementById("previewModal").addEventListener("click", (e) => { if(e.target === document.getElementById("previewModal")) { document.getElementById("previewModal").classList.remove("active"); document.getElementById("previewFrame").src = ""; } });
    
    // Default initial data seeding (if apps empty)
    async function seedInitialApps() { const snapshot = await get(ref(db, 'apps')); if(!snapshot.exists()) { const defaultApps = [ { title:"Tic Tac Toe", developer:"Nitesh", category:"Game", link:"tictactoe.html", iconImg:"https://img.poki-cdn.com/cdn-cgi/image/q=78,scq=50,width=1200,height=1200,fit=cover,f=png/b72f31aa574acaa5cbf6b6c69104c988/tictactoe.png", iconBg:"#10b981", playCount:120, avgRating:4.8 }, { title:"Simon Game", developer:"Nitesh", category:"Game", link:"simon.html", iconImg:"https://m.media-amazon.com/images/I/61MHBFYV0mL.png", iconBg:"#3b82f6", playCount:95 }, { title:"Memory Game", developer:"Nitesh", category:"Game", link:"memorygame.html", iconImg:"https://img.freepik.com/free-vector/hand-drawn-memory-game-cards_23-2150120462.jpg", playCount:210 }, { title:"FM Radio", developer:"Nitesh", category:"App", link:"hello.html", iconClass:"fa-solid fa-radio", iconBg:"#f97316", playCount:45 }, { title:"N-OS System", developer:"Nitesh", category:"App", link:"hi.html", iconClass:"fa-solid fa-mobile-screen-button", iconBg:"#6366f1", playCount:310 } ]; for(let app of defaultApps) { push(ref(db, 'apps'), app); } } }
    seedInitialApps();
    loadApps();
    
    // PWA install popup simulation
    let deferredPrompt; window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; setTimeout(() => { const pop = document.createElement("div"); pop.className = "pwa-popup show"; pop.innerHTML = `<div style="background:var(--surface); padding:20px; border-radius:24px; text-align:center"><h4>Install N-Store</h4><button id="installNowBtn" class="install-btn">Install</button><button id="pwaCancelBtn">Later</button></div>`; document.body.appendChild(pop); document.getElementById("installNowBtn")?.addEventListener("click", async () => { deferredPrompt.prompt(); pop.remove(); }); document.getElementById("pwaCancelBtn")?.addEventListener("click",()=>pop.remove()); }, 1000); });
    
    // Accessibility & confetti on install btn click (fake counter) already in play btn
    window.filterCategory = (cat) => { currentFilter = cat; renderApps(); };
    console.log("🔥 Next-gen N-Store loaded with Firebase, ratings, wishlist, top charts, offline ready!");
</script>
</body>
</html>
