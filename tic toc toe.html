<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Attack Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050a1a;
            --container-bg: #0c152e;
            --text-color: #e2e8f0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --x-color: #ff3333;
            --o-color: #33ff33;
            --cell-bg: rgba(255, 255, 255, 0.05);
            --cell-hover: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.15);
            --winning-bg: rgba(5, 10, 26, 0.95);
            --shadow-primary: 0 0 15px rgba(37, 99, 235, 0.5);
            --timer-safe: #10b981;
            --timer-warn: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), var(--shadow-primary);
            text-align: center;
            width: 95%;
            max-width: 500px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
            max-height: 95vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar { width: 5px; }
        .container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(135deg, #2563eb, #ff3333, #33ff33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-group { margin-bottom: 1.2rem; text-align: left; }
        .control-label { font-size: 0.95rem; color: #cbd5e1; margin-bottom: 8px; display: block; font-weight: 600; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; background-color: transparent; color: white; border: 2px solid var(--primary);
            padding: 8px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background-color: rgba(37, 99, 235, 0.2); }
        .btn.active { background-color: var(--primary); box-shadow: var(--shadow-primary); }

        .start-btn {
            background-color: #10b981; border: none; width: 100%; padding: 15px; font-size: 1.2rem;
            border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); color: white;
        }
        .start-btn:hover { background-color: #059669; transform: scale(1.02); }

        .slider-container { display: flex; align-items: center; gap: 15px; }
        input[type=range] { flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 8px; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--primary); cursor: pointer; box-shadow: 0 0 10px var(--primary); }
        .val-badge { font-size: 1.2rem; font-weight: 800; color: #3b82f6; min-width: 50px; text-align: center; background: rgba(59, 130, 246, 0.1); padding: 5px 10px; border-radius: 8px; }

        /* Timer Styles */
        #timer-container { display: none; width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-bottom: 15px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background-color: var(--timer-safe); transition: width 1s linear, background-color 0.3s; box-shadow: 0 0 10px var(--timer-safe); }
        #time-text { font-size: 1rem; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; display: none; }

        #game-screen { display: none; }
        .status { font-size: 1.3rem; margin-bottom: 0.5rem; font-weight: 700; color: #f8fafc; }
        .rule-text { font-size: 0.85rem; color: #94a3b8; margin-bottom: 1rem; font-weight: 600; letter-spacing: 1px;}

        .board { display: grid; gap: 6px; margin: 0 auto 1.5rem auto; width: 100%; }
        .cell {
            background-color: var(--cell-bg); border-radius: 8px; border: 2px solid var(--border-color);
            display: flex; justify-content: center; align-items: center; font-weight: 900;
            cursor: pointer; aspect-ratio: 1 / 1; transition: all 0.2s ease; user-select: none;
        }
        .cell:hover { background-color: var(--cell-hover); transform: scale(0.95); }
        .cell.x { color: var(--x-color); text-shadow: 0 0 10px var(--x-color); }
        .cell.o { color: var(--o-color); text-shadow: 0 0 10px var(--o-color); }
        .cell.pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cell.win-highlight { background-color: rgba(255, 255, 255, 0.2); border-color: white; transform: scale(1.05); z-index: 5; }

        #celebration-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--winning-bg); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px);
        }
        .winner-msg { font-size: 4rem; font-weight: 900; text-align: center; background: linear-gradient(135deg, #ff3333, #33ff33); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(255,255,255,0.2); animation: popIn 0.5s; }
        .sub-msg { font-size: 1.5rem; color: #cbd5e1; margin-top: 10px; font-weight: 600; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="home-screen">
        <h1>Tic Tac Toe Pro</h1>
        
        <div class="control-group">
            <label class="control-label">Select Mode:</label>
            <div class="btn-group">
                <button class="btn active" id="btn-1p" onclick="setMode('1p')">1 Player (CPU)</button>
                <button class="btn" id="btn-2p" onclick="setMode('2p')">2 Players</button>
            </div>
        </div>

        <div class="control-group" id="diff-group">
            <label class="control-label">CPU Difficulty:</label>
            <div class="btn-group">
                <button class="btn" id="btn-easy" onclick="setDiff('easy')">Easy</button>
                <button class="btn active" id="btn-medium" onclick="setDiff('medium')">Medium</button>
                <button class="btn" id="btn-hard" onclick="setDiff('hard')">Hard</button>
            </div>
        </div>

        <div class="control-group">
            <label class="control-label">Turn Timer:</label>
            <div class="btn-group">
                <button class="btn active" id="btn-timer-off" onclick="setTimer('off')">Off</button>
                <button class="btn" id="btn-timer-10" onclick="setTimer(10)">10 Sec</button>
                <button class="btn" id="btn-timer-15" onclick="setTimer(15)">15 Sec</button>
            </div>
        </div>

        <div class="control-group">
            <label class="control-label">Grid Size (Boxes):</label>
            <div class="slider-container">
                <input type="range" id="grid-slider" min="3" max="8" value="3" oninput="updateGridDisplay(this.value)">
                <div class="val-badge"><span id="g-val">3</span>x<span id="g-val2">3</span></div>
            </div>
        </div>

        <div class="control-group">
            <label class="control-label">Boxes to Match to Win:</label>
            <div class="slider-container">
                <input type="range" id="win-slider" min="3" max="3" value="3" oninput="updateWinDisplay(this.value)">
                <div class="val-badge" id="w-val">3</div>
            </div>
        </div>

        <button class="start-btn" onclick="startGame()">START BATTLE</button>
    </div>

    <div class="container" id="game-screen">
        <div class="status" id="status-text">Player X's Turn</div>
        <div class="rule-text" id="rule-display">Match 3 in a row to win!</div>
        
        <div id="time-text">00:10</div>
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>
        
        <div class="board" id="board"></div> 
        
        <div class="btn-group" style="margin-top: 15px;">
            <button class="btn" onclick="initBoard()">Restart</button>
            <button class="btn" onclick="goHome()">Menu</button>
        </div>
    </div>

    <div id="celebration-screen">
        <div class="winner-msg" id="winner-msg-text">Player X Wins!</div>
        <div class="sub-msg" id="sub-msg-text"></div>
        <button class="start-btn" style="width: auto; padding: 15px 40px; margin-top: 30px;" onclick="closeCelebration()">Play Again</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // Settings
        let mode = '1p';
        let diff = 'medium';
        let size = 3;
        let winLength = 3;
        let timerSetting = 'off'; 
        
        // Game State
        let board = [];
        let currentPlayer = 'X';
        let gameActive = false;
        let timerInterval;
        let timeLeft;

        // UI Setup Functions
        function setMode(m) {
            mode = m;
            document.getElementById('btn-1p').classList.toggle('active', m === '1p');
            document.getElementById('btn-2p').classList.toggle('active', m === '2p');
            document.getElementById('diff-group').style.display = m === '1p' ? 'block' : 'none';
        }

        function setDiff(d) {
            diff = d;
            ['easy', 'medium', 'hard'].forEach(x => { document.getElementById(`btn-${x}`).classList.toggle('active', x === d); });
        }

        function setTimer(t) {
            timerSetting = t;
            ['off', '10', '15'].forEach(x => { document.getElementById(`btn-timer-${x}`).classList.toggle('active', x == t); });
        }

        function updateGridDisplay(val) {
            size = parseInt(val);
            document.getElementById('g-val').innerText = size;
            document.getElementById('g-val2').innerText = size;
            const winSlider = document.getElementById('win-slider');
            winSlider.max = size; 
            if (parseInt(winSlider.value) > size) winSlider.value = size;
            updateWinDisplay(winSlider.value);
        }

        function updateWinDisplay(val) {
            winLength = parseInt(val);
            document.getElementById('w-val').innerText = winLength;
        }

        // Game Flow
        function startGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('rule-display').innerText = `MATCH ${winLength} IN A ROW TO WIN!`;
            
            if(timerSetting !== 'off') {
                document.getElementById('timer-container').style.display = 'block';
                document.getElementById('time-text').style.display = 'block';
            } else {
                document.getElementById('timer-container').style.display = 'none';
                document.getElementById('time-text').style.display = 'none';
            }
            
            initBoard();
        }

        function goHome() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
            gameActive = false;
        }

        function initBoard() {
            clearInterval(timerInterval);
            board = Array(size * size).fill("");
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('status-text').innerText = "Player X's Turn";

            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            boardEl.innerHTML = '';
            let fontSize = size <= 4 ? 3 : (size <= 6 ? 2 : 1.5);

            for(let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.idx = i;
                cell.style.fontSize = `${fontSize}rem`;
                cell.addEventListener('click', () => handleMove(i));
                boardEl.appendChild(cell);
            }
            
            startTurnTimer();
        }

        // --- TIMER LOGIC ---
        function startTurnTimer() {
            if(timerSetting === 'off' || !gameActive) return;
            
            // Don't show timer ticking if it's CPU's turn
            if(mode === '1p' && currentPlayer === 'O') {
                document.getElementById('timer-bar').style.width = '100%';
                document.getElementById('timer-bar').style.backgroundColor = 'var(--timer-safe)';
                document.getElementById('time-text').innerText = "CPU Time";
                return; 
            }

            clearInterval(timerInterval);
            timeLeft = parseInt(timerSetting);
            updateTimerUI();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeOut();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const bar = document.getElementById('timer-bar');
            const txt = document.getElementById('time-text');
            
            let maxTime = parseInt(timerSetting);
            let percentage = (timeLeft / maxTime) * 100;
            
            bar.style.width = `${percentage}%`;
            txt.innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;

            if(timeLeft <= 3) {
                bar.style.backgroundColor = 'var(--timer-warn)';
                bar.style.boxShadow = '0 0 15px var(--timer-warn)';
                txt.style.color = '#ef4444';
            } else {
                bar.style.backgroundColor = 'var(--timer-safe)';
                bar.style.boxShadow = '0 0 10px var(--timer-safe)';
                txt.style.color = '#cbd5e1';
            }
        }

        function handleTimeOut() {
            if(!gameActive) return;
            let winner = currentPlayer === 'X' ? 'O' : 'X';
            let subMessage = `Player ${currentPlayer} ran out of time!`;
            if(mode === '1p' && winner === 'O') subMessage = "You ran out of time!";
            
            endGame(winner, subMessage);
        }

        // --- MOVEMENT LOGIC ---
        function handleMove(idx) {
            if(!gameActive || board[idx] !== "" || (mode === '1p' && currentPlayer === 'O')) return;
            placeMark(idx, currentPlayer);
            
            if(gameActive && mode === '1p' && currentPlayer === 'O') {
                document.getElementById('status-text').innerText = "CPU is thinking...";
                startTurnTimer(); // Pause visuals for CPU
                setTimeout(cpuMove, 600);
            }
        }

        function placeMark(idx, player) {
            board[idx] = player;
            const cell = document.querySelector(`.cell[data-idx='${idx}']`);
            cell.innerText = player;
            cell.classList.add(player.toLowerCase(), 'pop');
            
            let winningCells = getWinningCells(player);
            
            if(winningCells) {
                winningCells.forEach(i => document.querySelector(`.cell[data-idx='${i}']`).classList.add('win-highlight'));
                setTimeout(() => endGame(player), 600);
            } else if(!board.includes("")) {
                endGame("Draw");
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                if(!(mode === '1p' && currentPlayer === 'O')) {
                    document.getElementById('status-text').innerText = `Player ${currentPlayer}'s Turn`;
                }
                startTurnTimer(); // Restart timer for next player
            }
        }

        function getWinningCells(player) {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c <= size - winLength; c++) {
                    let cells = [];
                    for (let i = 0; i < winLength; i++) { if (board[r * size + (c + i)] === player) cells.push(r * size + (c + i)); }
                    if (cells.length === winLength) return cells;
                }
            }
            for (let c = 0; c < size; c++) {
                for (let r = 0; r <= size - winLength; r++) {
                    let cells = [];
                    for (let i = 0; i < winLength; i++) { if (board[(r + i) * size + c] === player) cells.push((r + i) * size + c); }
                    if (cells.length === winLength) return cells;
                }
            }
            for (let r = 0; r <= size - winLength; r++) {
                for (let c = 0; c <= size - winLength; c++) {
                    let cells = [];
                    for (let i = 0; i < winLength; i++) { if (board[(r + i) * size + (c + i)] === player) cells.push((r + i) * size + (c + i)); }
                    if (cells.length === winLength) return cells;
                }
            }
            for (let r = 0; r <= size - winLength; r++) {
                for (let c = winLength - 1; c < size; c++) {
                    let cells = [];
                    for (let i = 0; i < winLength; i++) { if (board[(r + i) * size + (c - i)] === player) cells.push((r + i) * size + (c - i)); }
                    if (cells.length === winLength) return cells;
                }
            }
            return null;
        }

        function endGame(result, customSubMsg = "") {
            gameActive = false;
            clearInterval(timerInterval);
            
            let msgText = result === "Draw" ? "It's a Draw!" : (result === 'O' && mode === '1p' ? "CPU Wins!" : `Player ${result} Wins!`);
            document.getElementById('status-text').innerText = msgText;
            
            if(result !== "Draw") {
                document.getElementById('winner-msg-text').innerText = msgText;
                document.getElementById('sub-msg-text').innerText = customSubMsg;
                document.getElementById('celebration-screen').style.display = 'flex';
                fireConfetti();
            }
        }

        function cpuMove() {
            if(!gameActive) return;
            let move = -1;
            if(diff === 'hard' || (diff === 'medium' && Math.random() > 0.4)) {
                move = findBestMove('O');
                if(move === -1) move = findBestMove('X');
            }
            if(move === -1) {
                let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                move = empty[Math.floor(Math.random() * empty.length)];
            }
            if(move !== -1) placeMark(move, 'O');
        }

        function findBestMove(player) {
            for(let i = 0; i < board.length; i++) {
                if(board[i] === "") {
                    board[i] = player;
                    let wins = getWinningCells(player);
                    board[i] = ""; 
                    if(wins !== null) return i;
                }
            }
            return -1;
        }

        function fireConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff3333', '#33ff33'], zIndex: 110 });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff3333', '#33ff33'], zIndex: 110 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function closeCelebration() {
            document.getElementById('celebration-screen').style.display = 'none';
            initBoard();
        }
    </script>
</body>
</html>
