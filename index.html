<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta name="google-site-verification" content="Za1pEupQLM-LlPnODka_5pMgrC6DyOzmuDaZBepfg7Q" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    
    <title>N-Store | Premium App & Game Hub</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* (Baki CSS wahi hai jo tune diya tha, sirf kuch naye additions kiye hain) */
        :root {
            --bg-main: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-sub: #64748b;
            --primary: #10b981; --primary-hover: #059669; --primary-light: #d1fae5;
            --border: #e2e8f0; --hover-bg: #f1f5f9; --nav-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); --card-hover-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
            --popup-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a; --surface: #1e293b; --text-main: #f8fafc; --text-sub: #94a3b8;
            --primary: #10b981; --primary-hover: #34d399; --primary-light: rgba(16, 185, 129, 0.15);
            --border: #334155; --hover-bg: #334155; --nav-bg: rgba(30, 41, 59, 0.85);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); --card-hover-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            --popup-bg: rgba(30, 41, 59, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden; }

        /* Navbar CSS (Same as yours) */
        nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; position: sticky; top: 0; background: var(--nav-bg); z-index: 100; backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; color: var(--text-main); cursor: pointer; }
        .search-bar { background: var(--hover-bg); border-radius: 30px; display: flex; align-items: center; padding: 12px 24px; width: 40%; max-width: 500px; border: 1.5px solid transparent; transition: all 0.3s ease; }
        .search-bar input { border: none; background: transparent; color: var(--text-main); outline: none; width: 100%; margin-left: 14px; font-size: 15px; font-weight: 500; }
        .theme-btn { background: var(--surface); border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 50%; font-size: 18px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-actions { display: flex; align-items: center; gap: 12px; }

        .tabs { display: flex; gap: 32px; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 18px 0; font-weight: 600; font-size: 15px; color: var(--text-sub); cursor: pointer; white-space: nowrap; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 4px 4px 0 0; }

        .container { max-width: 1280px; margin: 0 auto; padding: 40px 28px; }
        .section-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 24px; font-weight: 700; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
        .app-card { background: var(--surface); display: flex; flex-direction: column; align-items: center; text-align: center; text-decoration: none; color: inherit; padding: 24px 20px; border-radius: 24px; border: 1px solid var(--border); transition: all 0.3s; box-shadow: var(--card-shadow); position: relative; cursor: pointer; }
        .app-card:hover { transform: translateY(-6px); box-shadow: var(--card-hover-shadow); }
        .app-icon { width: 85px; height: 85px; border-radius: 22px; display: flex; justify-content: center; align-items: center; font-size: 38px; color: white; margin-bottom: 18px; overflow: hidden; }
        .app-info { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-bottom: 10px; }
        .app-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-dev { font-size: 13px; color: var(--text-sub); }
        .app-meta { font-size: 12px; font-weight: 600; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* NEW: Action Buttons on Card */
        .card-actions { display: flex; width: 100%; gap: 10px; margin-top: auto; }
        .install-btn { background-color: var(--primary-light); color: var(--primary); border: none; padding: 10px 0; flex: 1; border-radius: 30px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .install-btn:hover { background-color: var(--primary); color: white; }
        
        .icon-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--hover-bg); border: none; color: var(--text-sub); cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .icon-btn:hover { background: #fee2e2; color: #ef4444; }
        .icon-btn.active { color: #ef4444; }

        /* Admin tools */
        #adminTools { display: none; padding: 10px 20px; background: #fff3cd; color: #856404; border-radius: 10px; margin-bottom: 20px; text-align: center; border: 1px solid #ffeeba;}
    </style>
</head>
<body>

    <nav>
        <div class="logo-area" onclick="filterCategory('All')">
            <i class="fa-brands fa-google-play" style="color: var(--primary);"></i> <span>N-Store</span>
        </div>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search premium apps & games...">
        </div>
        <div class="nav-actions">
            <div id="auth-section" style="display: flex; gap: 10px; align-items: center;">
                <button id="loginBtn" class="theme-btn" style="width: auto; padding: 0 16px; border-radius: 22px; font-weight: 700;">
                    <i class="fa-brands fa-google" style="margin-right: 6px;"></i> Login
                </button>
                <div id="userProfile" style="display: none; align-items: center; gap: 10px;">
                    <img id="userPhoto" src="" style="width: 38px; height: 38px; border-radius: 50%; object-fit: cover;">
                    <button id="logoutBtn" class="theme-btn" title="Logout"><i class="fa-solid fa-sign-out-alt"></i></button>
                </div>
            </div>
            <button class="theme-btn" id="themeToggle"><i class="fa-regular fa-moon"></i></button>
        </div>
    </nav>

    <div class="tabs">
        <div class="tab active" onclick="filterCategory('All')">For you</div>
        <div class="tab" onclick="filterCategory('Top charts')">Top charts <i class="fa-solid fa-fire" style="color:#ef4444; font-size:12px;"></i></div>
        <div class="tab" onclick="filterCategory('Library')">My Library <i class="fa-solid fa-heart" style="color:#ef4444; font-size:12px;"></i></div>
        <div class="tab" onclick="filterCategory('Game')">Games</div>
        <div class="tab" onclick="filterCategory('App')">Apps</div>
    </div>

    <div class="container">
        <div id="adminTools">
            <b>Admin Setup:</b> Apna purana hardcoded data Firebase mein upload karein? 
            <button onclick="uploadOldDataToFirebase()" style="padding: 5px 10px; margin-left:10px; cursor:pointer;">Upload Data</button>
        </div>

        <div class="section-header">
            <h2 class="section-title" id="sectionTitle">Recommended for you</h2>
        </div>
        
        <div class="app-grid" id="projectGrid">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, get, update, push, increment } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIfn-tI5koy-ZZOWrErlrNDd6kWN2AsKA",
            authDomain: "n-store-bad6b.firebaseapp.com",
            projectId: "n-store-bad6b",
            storageBucket: "n-store-bad6b.firebasestorage.app",
            messagingSenderId: "431750611629",
            appId: "1:431750611629:web:07d1941c9782fb3d48fc24",
            measurementId: "G-QB4HC3YYRF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global State
        window.allApps = []; 
        window.userFavorites = {}; 
        window.currentUser = null;
        let currentFilter = 'All';

        const grid = document.getElementById('projectGrid');
        const searchInput = document.getElementById('searchInput');
        const sectionTitle = document.getElementById('sectionTitle');

        // Authentication Logic
        onAuthStateChanged(auth, (user) => {
            window.currentUser = user;
            if (user) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userProfile').style.display = 'flex';
                document.getElementById('userPhoto').src = user.photoURL;
                
                // Show Admin Tools if it's YOU (Replace with your exact Google UID later if you want strict security)
                document.getElementById('adminTools').style.display = 'block'; 

                // Fetch User Favorites
                const favRef = ref(db, `users/${user.uid}/favorites`);
                onValue(favRef, (snapshot) => {
                    window.userFavorites = snapshot.val() || {};
                    renderProjects(searchInput.value);
                });
            } else {
                document.getElementById('loginBtn').style.display = 'flex';
                document.getElementById('userProfile').style.display = 'none';
                window.userFavorites = {};
                document.getElementById('adminTools').style.display = 'none';
                renderProjects(searchInput.value);
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // ----------------------------------------------------
        // 1. FETCH APPS FROM FIREBASE DYNAMICALLY
        // ----------------------------------------------------
        const appsRef = ref(db, 'apps');
        onValue(appsRef, (snapshot) => {
            window.allApps = [];
            if(snapshot.exists()) {
                snapshot.forEach(child => {
                    window.allApps.push({ id: child.key, ...child.val() });
                });
            }
            renderProjects(searchInput.value);
        });

        // ----------------------------------------------------
        // RENDER LOGIC (Handles Top Charts, Favorites, Search)
        // ----------------------------------------------------
        window.renderProjects = (searchQuery = '') => {
            grid.innerHTML = '';
            let filtered = window.allApps.filter(app => app.title.toLowerCase().includes(searchQuery.toLowerCase()));

            if (currentFilter === 'Top charts') {
                // Sort by PlayCount Highest to Lowest
                filtered.sort((a, b) => (b.playCount || 0) - (a.playCount || 0));
            } else if (currentFilter === 'Library') {
                // Show only Favorites
                filtered = filtered.filter(app => window.userFavorites[app.id]);
            } else if (currentFilter !== 'All') {
                // Filter by Game/App
                filtered = filtered.filter(app => app.category === currentFilter);
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-sub);">Oops! No apps found here.</div>';
                return;
            }

            filtered.forEach(project => {
                const isFav = window.userFavorites[project.id] ? 'active' : '';
                const iconContent = (project.imageIcon || project.iconImg) 
                    ? `<img src="${project.imageIcon || project.iconImg}" style="width:100%; height:100%; object-fit:cover; border-radius:22px;">` 
                    : `<i class="${project.iconClass}"></i>`;

                // Fake "1.2k" format for play counts
                const plays = project.playCount ? (project.playCount > 1000 ? (project.playCount/1000).toFixed(1) + 'k' : project.playCount) : 0;

                grid.innerHTML += `
                    <div class="app-card">
                        <div class="app-icon" style="background-color: ${project.iconBg}">${iconContent}</div>
                        <div class="app-info">
                            <div class="app-title">${project.title}</div>
                            <div class="app-dev">${project.developer}</div>
                            <div class="app-meta">
                                <span>${project.rating} <i class="fa-solid fa-star" style="color: #fbbf24;"></i></span>
                                <span style="margin: 0 5px;">•</span>
                                <span><i class="fa-solid fa-play" style="font-size:10px;"></i> ${plays} plays</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="icon-btn ${isFav}" onclick="toggleFavorite('${project.id}')" title="Wishlist">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                            <button class="install-btn" onclick="playGame('${project.id}', '${project.link}')">Play</button>
                            <button class="icon-btn" onclick="shareApp('${project.title}', '${project.link}')" title="Share">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        };

        // UI Tabs & Filters
        window.filterCategory = (category) => {
            currentFilter = category;
            if(category === 'All') sectionTitle.innerText = 'Recommended for you';
            else if(category === 'Top charts') sectionTitle.innerText = 'Trending Top Charts';
            else if(category === 'Library') sectionTitle.innerText = 'My Favorite Games';
            else sectionTitle.innerText = `Premium ${category}s`;

            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if(tab.innerText.includes(category) || (category === 'All' && tab.innerText.includes('For you'))) {
                    tab.classList.add('active');
                }
            });
            renderProjects(searchInput.value);
        }

        searchInput.addEventListener('input', (e) => renderProjects(e.target.value));

        // ----------------------------------------------------
        // FIREBASE ACTIONS: Play Count & Favorites
        // ----------------------------------------------------
        window.playGame = (appId, link) => {
            // Increment playCount by 1 in Firebase
            update(ref(db, `apps/${appId}`), {
                playCount: increment(1)
            });
            window.open(link, '_blank'); // Open game
        };

        window.toggleFavorite = (appId) => {
            if (!window.currentUser) return alert("Bhai, Favorites save karne ke liye login kar lo!");
            
            const isFav = window.userFavorites[appId];
            const updates = {};
            // If already favorite, set to null (delete), else set to true
            updates[`users/${window.currentUser.uid}/favorites/${appId}`] = isFav ? null : true;
            update(ref(db), updates);
        };

        window.shareApp = (title, link) => {
            const url = window.location.origin + '/' + link; // Adjust if needed
            if (navigator.share) {
                navigator.share({ title: `Play ${title} on N-Store`, text: `Bhai yeh mast game check kar!`, url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert("Link copied to clipboard!");
            }
        }

        // ----------------------------------------------------
        // DATA MIGRATION SCRIPT (USE ONLY ONCE!)
        // ----------------------------------------------------
        window.uploadOldDataToFirebase = () => {
            const oldProjects = [
                { title: "Tic Tac Toe", developer: "Nitesh", category: "Game", rating: "4.9", link: "tictactoe.html", iconImg: "https://img.poki-cdn.com/cdn-cgi/image/q=78,scq=50,width=1200,height=1200,fit=cover,f=png/b72f31aa574acaa5cbf6b6c69104c988/tictactoe.png", iconBg: "#ffffff", playCount: 154 },
                { title: "Simon Game", developer: "Nitesh", category: "Game", rating: "4.9", link: "simon.html", imageIcon: "https://m.media-amazon.com/images/I/61MHBFYV0mL.png", iconBg: "#4caf50", playCount: 342 },
                { title: "Memory Game", developer: "Nitesh", category: "Game", rating: "4.9", link: "memorygame.html", imageIcon: "https://img.freepik.com/free-vector/hand-drawn-memory-game-cards_23-2150120462.jpg", iconBg: "#ffffff", playCount: 89 },
                { title: "Bubble Shooter", developer: "Nitesh", category: "Game", rating: "4.8", link: "hello1.html", iconClass: "fa-solid fa-circle-dot", iconBg: "#3b82f6", playCount: 450 },
                { title: "FM Radio", developer: "Nitesh", category: "App", rating: "4.8", link: "hello.html", iconClass: "fa-solid fa-radio", iconBg: "#f97316", playCount: 210 },
                { title: "N-OS System", developer: "Nitesh", category: "App", rating: "5.0", link: "hi.html", iconClass: "fa-solid fa-mobile-screen-button", iconBg: "#6366f1", playCount: 500 }
            ];

            if(confirm("Are you sure you want to push old hardcoded data to Firebase?")) {
                oldProjects.forEach(app => push(ref(db, 'apps'), app));
                alert("Data uploaded successfully! Ab 'Admin Setup' bar hide kar sakte ho code se.");
            }
        }

        // Theme Logic
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.onclick = () => {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            themeBtn.innerHTML = newTheme === 'dark' ? '<i class="fa-solid fa-sun" style="color:#fbbf24;"></i>' : '<i class="fa-regular fa-moon"></i>';
        };

    </script>
</body>
</html>
