<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta name="google-site-verification" content="Za1pEupQLM-LlPnODka_5pMgrC6DyOzmuDaZBepfg7Q" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    
    <title>N-Store | Premium App & Game Hub</title>
    <meta name="description" content="N-Store: Discover the best web apps, tools, and HTML5 games. Play instantly without downloading.">
    <meta name="keywords" content="N-Store, Web Games, HTML5 Apps, Play online">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('N-Store PWA Registered!'))
            .catch(err => console.log('Registration failed', err));
        });
      }
    </script>
    
    <style>
        /* Premium N-Store Theme Variables */
        :root {
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --primary: #10b981; /* Emerald Green */
            --primary-hover: #059669;
            --primary-light: #d1fae5;
            --border: #e2e8f0;
            --hover-bg: #f1f5f9;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            --card-hover-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
            --popup-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #10b981;
            --primary-hover: #34d399;
            --primary-light: rgba(16, 185, 129, 0.15);
            --border: #334155;
            --hover-bg: #334155;
            --nav-bg: rgba(30, 41, 59, 0.85);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            --card-hover-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            --popup-bg: rgba(30, 41, 59, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden; }

        /* Sleek Glassmorphism Navbar */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 28px; position: sticky; top: 0;
            background: var(--nav-bg); z-index: 100;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; color: var(--text-main); cursor: pointer; letter-spacing: -0.5px;}
        .logo-area i { filter: drop-shadow(0 2px 4px rgba(16, 185, 129, 0.3)); }
        
        .search-bar {
            background: var(--hover-bg); border-radius: 30px;
            display: flex; align-items: center; padding: 12px 24px;
            width: 40%; max-width: 500px; border: 1.5px solid transparent;
            transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .search-bar:focus-within { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 4px var(--primary-light); }
        .search-bar i { color: var(--text-sub); font-size: 16px; }
        .search-bar input {
            border: none; background: transparent; color: var(--text-main);
            outline: none; width: 100%; margin-left: 14px; font-size: 15px; font-weight: 500;
        }
        .search-bar input::placeholder { color: var(--text-sub); font-weight: 400; }

        .theme-btn { 
            background: var(--surface); border: 1px solid var(--border); width: 44px; height: 44px; 
            border-radius: 50%; font-size: 18px; color: var(--text-main); 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .theme-btn:hover { background: var(--hover-bg); transform: rotate(15deg) scale(1.05); }

        .nav-actions { display: flex; align-items: center; gap: 12px; }

        /* Refined Navigation Tabs */
        .tabs {
            display: flex; gap: 32px; padding: 0 28px;
            border-bottom: 1px solid var(--border); background: var(--surface);
            overflow-x: auto; scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 18px 0; font-weight: 600; font-size: 15px;
            color: var(--text-sub); cursor: pointer; white-space: nowrap;
            transition: color 0.3s ease; position: relative;
        }
        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--primary); }
        .tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%;
            height: 3px; background: var(--primary); border-radius: 4px 4px 0 0;
            box-shadow: 0 -2px 8px rgba(16, 185, 129, 0.4);
        }

        /* Main Content */
        .container { max-width: 1280px; margin: 0 auto; padding: 40px 28px; }
        .section-header { margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between;}
        .section-title { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }

        /* Premium App Grid & Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
        
        .app-card {
            background: var(--surface); display: flex; flex-direction: column; 
            align-items: center; text-align: center; text-decoration: none; color: inherit;
            padding: 24px 20px; border-radius: 24px; border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--card-shadow);
            animation: fadeInUp 0.5s ease backwards;
        }
        .app-card:hover { 
            transform: translateY(-6px) scale(1.02); 
            box-shadow: var(--card-hover-shadow); 
            border-color: var(--primary-light);
        }

        .app-icon {
            width: 85px; height: 85px; border-radius: 22px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center; 
            font-size: 38px; color: white; margin-bottom: 18px;
            overflow: hidden; transition: transform 0.3s ease;
        }
        .app-card:hover .app-icon { transform: scale(1.05) rotate(-3deg); }

        .app-info { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-bottom: 20px; }
        .app-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
        .app-dev { font-size: 13px; color: var(--text-sub); font-weight: 500; }
        .app-meta { font-size: 12px; font-weight: 600; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 2px;}
        .star { color: #fbbf24; font-size: 12px; }

        .install-btn {
            background-color: var(--primary-light); color: var(--primary);
            border: none; padding: 10px 0; width: 100%;
            border-radius: 30px; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: all 0.3s ease; margin-top: auto;
        }
        .app-card:hover .install-btn { background-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }

        .no-results { grid-column: 1 / -1; text-align: center; color: var(--text-sub); padding: 60px 20px; font-size: 18px; line-height: 1.6; font-weight: 500;}

        /* PWA Install Popup */
        .pwa-popup {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 90%; max-width: 400px; background: var(--popup-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 20px; border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 1000;
            display: flex; flex-direction: column; gap: 16px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0;
        }
        .pwa-popup.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        .pwa-content { display: flex; align-items: center; gap: 16px; }
        .pwa-icon { width: 50px; height: 50px; border-radius: 14px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 24px; color: white;}
        .pwa-text h4 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: var(--text-main);}
        .pwa-text p { font-size: 13px; color: var(--text-sub); line-height: 1.4;}
        
        .pwa-actions { display: flex; gap: 12px; }
        .pwa-btn { flex: 1; padding: 10px; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: 0.2s;}
        .pwa-btn-cancel { background: var(--hover-bg); color: var(--text-main); }
        .pwa-btn-install { background: var(--primary); color: white; }
        .pwa-btn-install:hover { background: var(--primary-hover); }

        /* Mobile Bottom Nav */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; width: 100%;
            background: var(--nav-bg); border-top: 1px solid var(--border);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            justify-content: space-around; padding: 14px 0; z-index: 99;
            padding-bottom: env(safe-area-inset-bottom, 14px);
        }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-sub); font-size: 12px; cursor: pointer; font-weight: 600; transition: color 0.3s ease;}
        .bottom-nav-item.active { color: var(--primary); }
        .bottom-nav-item i { transition: transform 0.3s ease; }
        .bottom-nav-item.active i { transform: translateY(-3px); }

        /* ------------- PREMIUM CHAT SYSTEM STYLES ------------- */
        .chat-toggle-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: white; border: none;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            font-size: 24px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .chat-toggle-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 12px 30px rgba(16, 185, 129, 0.5); }
        .chat-toggle-btn .badge {
            position: absolute; top: 0; right: 0; background: #ef4444; width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid var(--surface); display: none;
        }

        .chat-window {
            position: fixed; bottom: 100px; right: 30px; width: 360px; height: 500px;
            background: var(--surface); border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 1001; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(20px); opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chat-window.active { transform: translateY(0); opacity: 1; pointer-events: all; }

        .chat-header {
            padding: 18px 20px; background: var(--primary); color: white;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 700; font-size: 16px;
        }
        .chat-header .close-btn { cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.2s;}
        .chat-header .close-btn:hover { background: rgba(255,255,255,0.3); }

        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
            background: var(--bg-main);
        }
        
        .msg-row { display: flex; gap: 10px; max-width: 85%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.other { align-self: flex-start; }
        
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--border);}
        
        .msg-content { display: flex; flex-direction: column; gap: 4px; }
        .msg-row.me .msg-content { align-items: flex-end; }
        .msg-row.other .msg-content { align-items: flex-start; }

        .msg-name { font-size: 11px; color: var(--text-sub); font-weight: 600; padding: 0 4px; }
        
        .msg-bubble {
            padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4;
            word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .msg-row.me .msg-bubble { background: var(--primary); color: white; border-top-right-radius: 4px; }
        .msg-row.other .msg-bubble { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); border-top-left-radius: 4px; }

        .chat-input-area {
            padding: 16px; background: var(--surface); border-top: 1px solid var(--border);
            display: flex; gap: 10px; align-items: center;
        }
        .chat-input-area input {
            flex: 1; padding: 12px 18px; border-radius: 24px; border: 1px solid var(--border);
            background: var(--hover-bg); color: var(--text-main); outline: none; transition: 0.3s;
        }
        .chat-input-area input:focus { border-color: var(--primary); background: var(--surface); }
        .chat-send-btn {
            width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
            color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }
        .chat-send-btn:hover { background: var(--primary-hover); transform: scale(1.05); }
        .chat-send-btn:disabled { background: var(--text-sub); cursor: not-allowed; box-shadow: none; transform: none;}

        .chat-overlay-login {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(var(--bg-main), 0.9); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; gap: 15px; text-align: center; padding: 20px;
        }

        @media (max-width: 768px) {
            .search-bar { width: 100%; max-width: none; margin-top: 12px; order: 3;}
            nav { padding: 16px; justify-content: space-between; }
            .nav-actions { order: 2; }
            .bottom-nav { display: flex; }
            .container { padding: 24px 16px 100px 16px; }
            .app-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
            .app-card { padding: 20px 16px; border-radius: 20px;}
            .app-icon { width: 75px; height: 75px; font-size: 32px; border-radius: 18px;}
            .pwa-popup { bottom: 90px; width: 92%; }
            .chat-window { width: 90%; right: 5%; bottom: 100px; height: 60vh; z-index: 1001; }
            .chat-toggle-btn { bottom: 100px; right: 20px; width: 55px; height: 55px; z-index: 1000;}
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area" onclick="filterCategory('All')">
            <i class="fa-brands fa-google-play" style="color: var(--primary);"></i>
            <span>N-Store</span>
        </div>
        
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search premium apps & games...">
        </div>
        
        <div class="nav-actions">
            <div id="auth-section" style="display: flex; gap: 10px; align-items: center;">
                <button id="loginBtn" class="theme-btn" title="Login with Google" style="width: auto; padding: 0 16px; border-radius: 22px; font-size: 14px; font-weight: 700;">
                    <i class="fa-brands fa-google" style="margin-right: 6px; color: var(--text-main);"></i> Login
                </button>
                <div id="userProfile" style="display: none; align-items: center; gap: 10px;">
                    <img id="userPhoto" src="" style="width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover;">
                    <button id="logoutBtn" class="theme-btn" title="Logout" style="width: 38px; height: 38px;">
                        <i class="fa-solid fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <button class="theme-btn" id="themeToggle" title="Toggle Dark Mode">
                <i class="fa-regular fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="tabs">
        <div class="tab active" onclick="filterCategory('All')">For you</div>
        <div class="tab" onclick="filterCategory('Top charts')">Top charts</div>
        <div class="tab" onclick="filterCategory('Game')">Games</div>
        <div class="tab" onclick="filterCategory('App')">Apps</div>
    </div>

    <div class="container">
        <div class="section-header">
            <h2 class="section-title" id="sectionTitle">Recommended for you</h2>
        </div>
        <div class="app-grid" id="projectGrid">
            </div>
    </div>

    <div id="pwa-install-prompt" class="pwa-popup">
        <div class="pwa-content">
            <div class="pwa-icon">
                <i class="fa-brands fa-google-play"></i>
            </div>
            <div class="pwa-text">
                <h4>Install N-Store App</h4>
                <p>Add to home screen for faster access & offline features!</p>
            </div>
        </div>
        <div class="pwa-actions">
            <button class="pwa-btn pwa-btn-cancel" id="pwa-cancel-btn">Not Now</button>
            <button class="pwa-btn pwa-btn-install" id="pwa-install-btn">Install Now</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="bottom-nav-item active" onclick="filterCategory('Game')">
            <i class="fa-solid fa-gamepad fa-lg"></i>
            <span>Games</span>
        </div>
        <div class="bottom-nav-item" onclick="filterCategory('App')">
            <i class="fa-solid fa-layer-group fa-lg"></i>
            <span>Apps</span>
        </div>
        <div class="bottom-nav-item" onclick="document.getElementById('searchInput').focus(); window.scrollTo(0,0);">
            <i class="fa-solid fa-magnifying-glass fa-lg"></i>
            <span>Search</span>
        </div>
    </div>

    <button class="chat-toggle-btn" id="chatToggleBtn" title="Global Chat">
        <i class="fa-solid fa-comment-dots"></i>
        <div class="badge" id="chatBadge"></div>
    </button>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div><i class="fa-solid fa-users" style="margin-right: 8px;"></i> Global Lounge</div>
            <div class="close-btn" id="chatCloseBtn"><i class="fa-solid fa-xmark"></i></div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." disabled>
            <button class="chat-send-btn" id="chatSendBtn" disabled>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <div class="chat-overlay-login" id="chatLoginOverlay">
            <i class="fa-solid fa-lock fa-3x" style="color: var(--text-sub);"></i>
            <h3 style="color: var(--text-main);">Login to Chat</h3>
            <p style="color: var(--text-sub); font-size: 14px;">Join the community to talk with other players.</p>
            <button class="theme-btn" id="chatOverlayLoginBtn" style="width: auto; padding: 0 20px; border-radius: 20px; background: var(--primary); color: white; border: none; font-weight: bold;">
                <i class="fa-brands fa-google" style="margin-right: 8px;"></i> Login with Google
            </button>
        </div>
    </div>

    <script>
        const myProjects = [
            {
                title: "Tic Tac Toe",
                developer: "Nitesh",
                category: "Game",
                rating: "4.9",
                link: "tictactoe.html",
                iconImg: "https://img.poki-cdn.com/cdn-cgi/image/q=78,scq=50,width=1200,height=1200,fit=cover,f=png/b72f31aa574acaa5cbf6b6c69104c988/tictactoe.png",
                iconBg: "#ffffff"
            },
            {
                title: "Simon Game",
                developer: "Nitesh",
                category: "Game",
                rating: "4.9",
                link: "simon.html",
                imageIcon: "https://m.media-amazon.com/images/I/61MHBFYV0mL.png", 
                iconBg: "#4caf50" 
            },
            {
                title: "Memory Game",
                developer: "Nitesh",
                category: "Game",
                rating: "4.9",
                link: "memorygame.html",
                imageIcon: "https://img.freepik.com/free-vector/hand-drawn-memory-game-cards_23-2150120462.jpg", 
                iconBg: "#ffffff"
            },
            {
                title: "Bubble Shooter",
                developer: "Nitesh",
                category: "Game",
                rating: "4.8",
                link: "hello1.html",
                iconClass: "fa-solid fa-circle-dot", 
                iconBg: "#3b82f6" 
            },
            {
                title: "FM Radio",
                developer: "Nitesh",
                category: "App",
                rating: "4.8",
                link: "hello.html",
                iconClass: "fa-solid fa-radio",
                iconBg: "#f97316" 
            },
            {
                title: "N-OS System",
                developer: "Nitesh",
                category: "App",
                rating: "5.0",
                link: "hi.html",
                iconClass: "fa-solid fa-mobile-screen-button",
                iconBg: "#6366f1" 
            }
        ];

        const grid = document.getElementById('projectGrid');
        const searchInput = document.getElementById('searchInput');
        const sectionTitle = document.getElementById('sectionTitle');
        let currentFilter = 'All';

        function renderProjects(searchQuery = '') {
            grid.innerHTML = '';

            if (myProjects.length === 0) {
                grid.innerHTML = '<div class="no-results"><i class="fa-solid fa-folder-open fa-3x" style="margin-bottom:20px; color: var(--primary);"></i><br>Abhi tak koi app add nahi kiya gaya hai.</div>';
                return;
            }
            
            const filtered = myProjects.filter(project => {
                const matchesSearch = project.title.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCategory = currentFilter === 'All' || currentFilter === 'Top charts' || project.category === currentFilter;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results"><i class="fa-regular fa-face-frown fa-3x" style="margin-bottom:20px; color: var(--text-sub);"></i><br>No matching apps found.</div>';
                return;
            }

            filtered.forEach((project, index) => {
                let iconContent = '';
                if (project.imageIcon || project.iconImg) {
                    const imgSrc = project.imageIcon ? project.imageIcon : project.iconImg;
                    iconContent = `<img src="${imgSrc}" alt="${project.title}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 22px;">`;
                } else {
                    iconContent = `<i class="${project.iconClass}"></i>`;
                }

                const animationDelay = index * 0.05;

                const card = `
                    <a href="${project.link}" target="_blank" class="app-card" style="animation-delay: ${animationDelay}s">
                        <div class="app-icon" style="background-color: ${project.iconBg}">
                            ${iconContent}
                        </div>
                        <div class="app-info">
                            <div class="app-title" title="${project.title}">${project.title}</div>
                            <div class="app-dev">${project.developer}</div>
                            <div class="app-meta">
                                ${project.rating} <i class="fa-solid fa-star star"></i>
                            </div>
                        </div>
                        <button class="install-btn">Play</button>
                    </a>
                `;
                grid.innerHTML += card;
            });
        }

        function filterCategory(category) {
            currentFilter = category;
            
            if(category === 'All') sectionTitle.innerText = 'Recommended for you';
            else if(category === 'Top charts') sectionTitle.innerText = 'Top charts';
            else sectionTitle.innerText = `Premium ${category}s`;

            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
                if(tab.innerText.includes(category) || (category === 'All' && tab.innerText === 'For you')) {
                    tab.classList.add('active');
                }
            });

            document.querySelectorAll('.bottom-nav-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(category)) item.classList.add('active');
            });

            renderProjects(searchInput.value);
        }

        searchInput.addEventListener('input', (e) => {
            renderProjects(e.target.value);
        });

        // Theme Toggle Logic
        const themeBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        themeBtn.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            
            if (newTheme === 'dark') {
                themeBtn.innerHTML = '<i class="fa-solid fa-sun" style="color:#fbbf24;"></i>';
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0f172a');
            } else {
                themeBtn.innerHTML = '<i class="fa-regular fa-moon"></i>';
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#ffffff');
            }
        });

        // PWA Install Logic
        let deferredPrompt;
        const pwaPopup = document.getElementById('pwa-install-prompt');
        const installBtn = document.getElementById('pwa-install-btn');
        const cancelBtn = document.getElementById('pwa-cancel-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                pwaPopup.classList.add('show');
            }, 2000);
        });

        installBtn.addEventListener('click', async () => {
            pwaPopup.classList.remove('show');
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });

        cancelBtn.addEventListener('click', () => {
            pwaPopup.classList.remove('show');
        });

        // Initial render
        renderProjects();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIfn-tI5koy-ZZOWrErlrNDd6kWN2AsKA",
            authDomain: "n-store-bad6b.firebaseapp.com",
            projectId: "n-store-bad6b",
            storageBucket: "n-store-bad6b.firebasestorage.app",
            messagingSenderId: "431750611629",
            appId: "1:431750611629:web:07d1941c9782fb3d48fc24",
            measurementId: "G-QB4HC3YYRF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getDatabase(app);
        
        // Load last 50 messages to save data
        const messagesRef = ref(db, 'global_chat');
        const recentMessagesQuery = query(messagesRef, limitToLast(50));

        // Auth & App UI Elements
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userProfile = document.getElementById('userProfile');
        const userPhoto = document.getElementById('userPhoto');
        const sectionTitleElement = document.getElementById('sectionTitle');
        
        // Chat UI Elements
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatWindow = document.getElementById('chatWindow');
        const chatCloseBtn = document.getElementById('chatCloseBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatLoginOverlay = document.getElementById('chatLoginOverlay');
        const chatOverlayLoginBtn = document.getElementById('chatOverlayLoginBtn');
        const chatBadge = document.getElementById('chatBadge');

        // Chat Toggle Logic
        let isChatOpen = false;
        chatToggleBtn.onclick = () => {
            isChatOpen = true;
            chatWindow.classList.add('active');
            chatBadge.style.display = 'none'; // Clear notifications
            setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 300); // Scroll to bottom on open
        };
        chatCloseBtn.onclick = () => {
            isChatOpen = false;
            chatWindow.classList.remove('active');
        };

        // Authentication Handlers
        const loginUser = () => {
            signInWithPopup(auth, provider).catch(err => alert("Login Error: " + err.message));
        };
        loginBtn.onclick = loginUser;
        chatOverlayLoginBtn.onclick = loginUser;
        logoutBtn.onclick = () => signOut(auth);

        // Track Current User and Update UI dynamically
        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // UI Updates for Logged In User
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                userPhoto.src = user.photoURL || 'https://via.placeholder.com/38';
                
                // Greeting update
                const firstName = user.displayName ? user.displayName.split(' ')[0] : 'Gamer';
                if (document.querySelector('.tab.active').innerText === 'For you') {
                    sectionTitleElement.innerText = `Welcome back, ${firstName}!`;
                }
                
                // Unlock Chat UI
                chatLoginOverlay.style.display = 'none';
                chatInput.disabled = false;
                chatSendBtn.disabled = false;
            } else {
                // UI Updates for Logged Out User
                loginBtn.style.display = 'flex';
                userProfile.style.display = 'none';
                
                if (document.querySelector('.tab.active').innerText === 'For you') {
                    sectionTitleElement.innerText = 'Recommended for you';
                }
                
                // Lock Chat UI
                chatLoginOverlay.style.display = 'flex';
                chatInput.disabled = true;
                chatSendBtn.disabled = true;
            }
        });

        // Send Message Function
        const sendMessage = () => {
            if (!currentUser) return;
            const text = chatInput.value.trim();
            if (text.length === 0) return;

            push(messagesRef, {
                uid: currentUser.uid,
                name: currentUser.displayName,
                photo: currentUser.photoURL,
                text: text,
                timestamp: serverTimestamp()
            });

            chatInput.value = '';
            chatInput.focus();
        };

        chatSendBtn.onclick = sendMessage;
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Listen for Realtime Chat Messages
        onChildAdded(recentMessagesQuery, (snapshot) => {
            const msg = snapshot.val();
            const isMe = currentUser && msg.uid === currentUser.uid;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg-row ${isMe ? 'me' : 'other'}`;
            
            const photoUrl = msg.photo || 'https://via.placeholder.com/32';
            const firstName = msg.name ? msg.name.split(' ')[0] : 'User';

            msgDiv.innerHTML = `
                <img src="${photoUrl}" class="msg-avatar" alt="User">
                <div class="msg-content">
                    ${!isMe ? `<span class="msg-name">${firstName}</span>` : ''}
                    <div class="msg-bubble">${msg.text}</div>
                </div>
            `;
            
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Trigger Notification Badge if message received while chat is closed
            if (!isChatOpen && !isMe) {
                chatBadge.style.display = 'block';
            }
        });
    </script>
</body>
</html>
