<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Simon Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: white;
            transition: background-color 0.2s;
        }

        .game-container {
            text-align: center;
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .header h1 {
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 1.1rem;
            color: #aaa;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background: #444;
            color: white;
            transition: 0.2s;
        }

        button:hover { background: #666; }
        #start-btn { background: #28a745; }
        #start-btn:hover { background: #218838; }

        .display {
            font-size: 1.2rem;
            font-weight: bold;
            background: #000;
            padding: 8px 15px;
            border-radius: 5px;
            color: #ff3333;
            font-family: monospace;
            border: 2px solid #333;
            min-width: 180px; /* Thoda wide kiya taki lamba text fit ho sake */
            text-align: center;
            transition: all 0.2s;
        }

        .simon-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 320px;
            margin: auto;
        }

        .pad {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.1s ease;
            border: 4px solid #333;
        }

        .pad.active {
            opacity: 1;
            transform: scale(1.05);
            border-color: white;
        }

        .green { background-color: #00a74a; box-shadow: 0 0 0 #00a74a; }
        .red { background-color: #9f0f17; box-shadow: 0 0 0 #9f0f17; }
        .yellow { background-color: #cca707; box-shadow: 0 0 0 #cca707; }
        .blue { background-color: #094a8f; box-shadow: 0 0 0 #094a8f; }

        .green.active { box-shadow: 0 0 25px #00a74a; }
        .red.active { box-shadow: 0 0 25px #9f0f17; }
        .yellow.active { box-shadow: 0 0 25px #cca707; }
        .blue.active { box-shadow: 0 0 25px #094a8f; }

        body.game-over {
            background-color: #8b0000;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>SIMON PRO</h1>
            <div class="stats">
                <span>High Score: <span id="high-score">0</span></span>
            </div>
            <div class="controls">
                <button id="start-btn">Start</button>
                <div class="display" id="status-display">Level: <span>0</span></div>
                <button id="strict-btn">Strict: OFF</button>
            </div>
        </div>
        <div class="simon-board">
            <div class="pad green" data-color="green"></div>
            <div class="pad red" data-color="red"></div>
            <div class="pad yellow" data-color="yellow"></div>
            <div class="pad blue" data-color="blue"></div>
        </div>
    </div>

    <script>
        const pads = document.querySelectorAll('.pad');
        const startBtn = document.getElementById('start-btn');
        const strictBtn = document.getElementById('strict-btn');
        const statusDisplay = document.getElementById('status-display');
        const highScoreDisplay = document.getElementById('high-score');

        const colors = ['green', 'red', 'yellow', 'blue'];
        const frequencies = { green: 329.6, red: 261.6, yellow: 277.2, blue: 311.1 };

        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let highScore = localStorage.getItem('simonHighScore') || 0;
        let isPlayerTurn = false;
        let strictMode = false;
        let audioCtx;
        
        highScoreDisplay.innerText = highScore;

        function playTone(color) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(color === 'error' ? 150 : frequencies[color], audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function activatePad(color) {
            const pad = document.querySelector(`.${color}`);
            pad.classList.add('active');
            playTone(color);
            setTimeout(() => pad.classList.remove('active'), 300);
        }

        function playSequence() {
            isPlayerTurn = false;
            playerSequence = [];
            let i = 0;
            
            const speed = Math.max(300, 800 - (level * 35)); 

            const interval = setInterval(() => {
                activatePad(sequence[i]);
                i++;
                if (i >= sequence.length) {
                    clearInterval(interval);
                    isPlayerTurn = true; 
                }
            }, speed);
        }

        function nextLevel() {
            level++;
            // Wapas normal level text dikhane ke liye
            statusDisplay.innerHTML = `Level: <span>${level}</span>`;
            statusDisplay.style.color = '#ff3333';
            
            if (level > highScore) {
                highScore = level;
                localStorage.setItem('simonHighScore', highScore);
                highScoreDisplay.innerText = highScore;
            }

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
            setTimeout(playSequence, 1000);
        }

        function handlePadClick(e) {
            if (!isPlayerTurn) return; 
            
            const color = e.target.dataset.color;
            activatePad(color);
            playerSequence.push(color);
            checkSequence();
        }

        function checkSequence() {
            const currentMove = playerSequence.length - 1;
            
            // Wrong move
            if (playerSequence[currentMove] !== sequence[currentMove]) {
                gameOver();
                return;
            }
            
            // Completed sequence successfully
            if (playerSequence.length === sequence.length) {
                isPlayerTurn = false;
                
                // Yahan par "Congratulations 🎉" text add kiya gaya hai
                statusDisplay.innerText = "Congratulations 🎉";
                statusDisplay.style.color = "#28a745"; // Success ke liye green color
                
                setTimeout(nextLevel, 1500); // 1.5 seconds wait karega taki player text padh sake
            }
        }

        function gameOver() {
            document.body.classList.add('game-over');
            statusDisplay.innerText = "Game Over 💥";
            playTone('error'); 
            
            setTimeout(() => {
                document.body.classList.remove('game-over');
            }, 300);
            
            if (strictMode) {
                sequence = [];
                level = 0;
                setTimeout(nextLevel, 1500);
            } else {
                playerSequence = [];
                setTimeout(() => {
                    statusDisplay.innerHTML = `Level: <span>${level}</span>`;
                    playSequence();
                }, 1500); 
            }
        }

        startBtn.addEventListener('click', () => {
            sequence = [];
            level = 0;
            statusDisplay.innerHTML = `Level: <span>0</span>`;
            statusDisplay.style.color = '#ff3333';
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBtn.innerText = "Restart";
            nextLevel();
        });

        strictBtn.addEventListener('click', () => {
            strictMode = !strictMode;
            strictBtn.innerText = `Strict: ${strictMode ? 'ON' : 'OFF'}`;
            strictBtn.style.backgroundColor = strictMode ? '#dc3545' : '#444';
        });

        pads.forEach(pad => pad.addEventListener('click', handlePadClick));
    </script>
</body>
</html>
