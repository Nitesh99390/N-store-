<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta name="google-site-verification" content="Za1pEupQLM-LlPnODka_5pMgrC6DyOzmuDaZBepfg7Q" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    
    <title>N-Store | Premium App & Game Hub</title>
    <meta name="description" content="N-Store: Discover the best web apps, tools, and HTML5 games. Play instantly without downloading.">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Premium N-Store Theme Variables */
        :root {
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --primary: #10b981;
            --primary-hover: #059669;
            --primary-light: #d1fae5;
            --border: #e2e8f0;
            --hover-bg: #f1f5f9;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            --card-hover-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
            --popup-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #10b981;
            --primary-hover: #34d399;
            --primary-light: rgba(16, 185, 129, 0.15);
            --border: #334155;
            --hover-bg: #334155;
            --nav-bg: rgba(30, 41, 59, 0.85);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            --card-hover-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            --popup-bg: rgba(30, 41, 59, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); transition: background 0.4s ease, color 0.4s ease; overflow-x: hidden; }

        /* Sleek Glassmorphism Navbar */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 28px; position: sticky; top: 0;
            background: var(--nav-bg); z-index: 100;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; color: var(--text-main); cursor: pointer; }
        
        .search-bar {
            background: var(--hover-bg); border-radius: 30px;
            display: flex; align-items: center; padding: 12px 24px;
            width: 40%; max-width: 500px; border: 1.5px solid transparent;
            transition: all 0.3s ease;
        }
        .search-bar:focus-within { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 4px var(--primary-light); }
        .search-bar i { color: var(--text-sub); font-size: 16px; }
        .search-bar input {
            border: none; background: transparent; color: var(--text-main);
            outline: none; width: 100%; margin-left: 14px; font-size: 15px; font-weight: 500;
        }

        .theme-btn { 
            background: var(--surface); border: 1px solid var(--border); width: 44px; height: 44px; 
            border-radius: 50%; font-size: 18px; color: var(--text-main); 
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        .theme-btn:hover { background: var(--hover-bg); transform: scale(1.05); }

        /* Main Content */
        .container { max-width: 1280px; margin: 0 auto; padding: 40px 28px; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
        
        /* ------------- CHAT SYSTEM STYLES ------------- */
        .chat-toggle-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 999;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: white; border: none;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            font-size: 24px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .chat-toggle-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 12px 30px rgba(16, 185, 129, 0.5); }
        .chat-toggle-btn .badge {
            position: absolute; top: 0; right: 0; background: #ef4444; width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid var(--surface); display: none;
        }

        .chat-window {
            position: fixed; bottom: 100px; right: 30px; width: 360px; height: 500px;
            background: var(--surface); border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 1000; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(20px); opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chat-window.active { transform: translateY(0); opacity: 1; pointer-events: all; }

        .chat-header {
            padding: 18px 20px; background: var(--primary); color: white;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 700; font-size: 16px;
        }
        .chat-header .close-btn { cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.2s;}
        .chat-header .close-btn:hover { background: rgba(255,255,255,0.3); }

        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
            background: var(--bg-main);
        }
        
        .msg-row { display: flex; gap: 10px; max-width: 85%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.other { align-self: flex-start; }
        
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--border);}
        
        .msg-content { display: flex; flex-direction: column; gap: 4px; }
        .msg-row.me .msg-content { align-items: flex-end; }
        .msg-row.other .msg-content { align-items: flex-start; }

        .msg-name { font-size: 11px; color: var(--text-sub); font-weight: 600; padding: 0 4px; }
        
        .msg-bubble {
            padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4;
            word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .msg-row.me .msg-bubble { background: var(--primary); color: white; border-top-right-radius: 4px; }
        .msg-row.other .msg-bubble { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); border-top-left-radius: 4px; }

        .chat-input-area {
            padding: 16px; background: var(--surface); border-top: 1px solid var(--border);
            display: flex; gap: 10px; align-items: center;
        }
        .chat-input-area input {
            flex: 1; padding: 12px 18px; border-radius: 24px; border: 1px solid var(--border);
            background: var(--hover-bg); color: var(--text-main); outline: none; transition: 0.3s;
        }
        .chat-input-area input:focus { border-color: var(--primary); background: var(--surface); }
        .chat-send-btn {
            width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
            color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }
        .chat-send-btn:hover { background: var(--primary-hover); transform: scale(1.05); }
        .chat-send-btn:disabled { background: var(--text-sub); cursor: not-allowed; box-shadow: none; transform: none;}

        .chat-overlay-login {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(var(--bg-main), 0.9); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; gap: 15px; text-align: center; padding: 20px;
        }

        @media (max-width: 768px) {
            .chat-window { width: 90%; right: 5%; bottom: 90px; height: 60vh; }
            .chat-toggle-btn { bottom: 90px; right: 20px; width: 55px; height: 55px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <i class="fa-brands fa-google-play" style="color: var(--primary);"></i>
            <span>N-Store</span>
        </div>
        
        <div class="nav-actions">
            <div id="auth-section" style="display: flex; gap: 10px; align-items: center;">
                <button id="loginBtn" class="theme-btn" style="width: auto; padding: 0 16px; border-radius: 22px; font-weight: 700;">
                    <i class="fa-brands fa-google" style="margin-right: 6px;"></i> Login
                </button>
                <div id="userProfile" style="display: none; align-items: center; gap: 10px;">
                    <img id="userPhoto" src="" style="width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover;">
                    <button id="logoutBtn" class="theme-btn" title="Logout" style="width: 38px; height: 38px;">
                        <i class="fa-solid fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            <button class="theme-btn" id="themeToggle"><i class="fa-regular fa-moon"></i></button>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 20px;">Welcome to N-Store</h2>
        <p style="color: var(--text-sub); margin-bottom: 40px;">Apne apps yahan add karein...</p>
        </div>

    <button class="chat-toggle-btn" id="chatToggleBtn">
        <i class="fa-solid fa-comment-dots"></i>
        <div class="badge" id="chatBadge"></div>
    </button>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div><i class="fa-solid fa-users" style="margin-right: 8px;"></i> Global Lounge</div>
            <div class="close-btn" id="chatCloseBtn"><i class="fa-solid fa-xmark"></i></div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." disabled>
            <button class="chat-send-btn" id="chatSendBtn" disabled>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <div class="chat-overlay-login" id="chatLoginOverlay">
            <i class="fa-solid fa-lock fa-3x" style="color: var(--text-sub);"></i>
            <h3 style="color: var(--text-main);">Login to Chat</h3>
            <p style="color: var(--text-sub); font-size: 14px;">Join the community to talk with other players.</p>
            <button class="theme-btn" id="chatOverlayLoginBtn" style="width: auto; padding: 0 20px; border-radius: 20px; background: var(--primary); color: white; border: none; font-weight: bold;">
                <i class="fa-brands fa-google" style="margin-right: 8px;"></i> Login with Google
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        // Import Database logic
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // Tumhari Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCIfn-tI5koy-ZZOWrErlrNDd6kWN2AsKA",
            authDomain: "n-store-bad6b.firebaseapp.com",
            projectId: "n-store-bad6b",
            storageBucket: "n-store-bad6b.firebasestorage.app",
            messagingSenderId: "431750611629",
            appId: "1:431750611629:web:07d1941c9782fb3d48fc24",
            measurementId: "G-QB4HC3YYRF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getDatabase(app);
        
        // Chat Reference (Load only last 50 messages initially to save data)
        const messagesRef = ref(db, 'global_chat');
        const recentMessagesQuery = query(messagesRef, limitToLast(50));

        // UI Elements
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userProfile = document.getElementById('userProfile');
        const userPhoto = document.getElementById('userPhoto');
        
        // Chat UI Elements
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatWindow = document.getElementById('chatWindow');
        const chatCloseBtn = document.getElementById('chatCloseBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatLoginOverlay = document.getElementById('chatLoginOverlay');
        const chatOverlayLoginBtn = document.getElementById('chatOverlayLoginBtn');
        const chatBadge = document.getElementById('chatBadge');

        // Theme Toggle (Dark/Light mode)
        document.getElementById('themeToggle').onclick = () => {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        };

        // Chat Window Toggle
        let isChatOpen = false;
        chatToggleBtn.onclick = () => {
            isChatOpen = true;
            chatWindow.classList.add('active');
            chatBadge.style.display = 'none'; // hide notification badge
            setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 300);
        };
        chatCloseBtn.onclick = () => {
            isChatOpen = false;
            chatWindow.classList.remove('active');
        };

        // Auth Functions
        const loginUser = () => signInWithPopup(auth, provider).catch(err => alert(err.message));
        loginBtn.onclick = loginUser;
        chatOverlayLoginBtn.onclick = loginUser;
        logoutBtn.onclick = () => signOut(auth);

        // Auth State Observer
        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // UI Updates for Logged in user
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                userPhoto.src = user.photoURL || 'https://via.placeholder.com/38';
                
                // Chat UI Updates
                chatLoginOverlay.style.display = 'none';
                chatInput.disabled = false;
                chatSendBtn.disabled = false;
            } else {
                // UI Updates for Logged out user
                loginBtn.style.display = 'flex';
                userProfile.style.display = 'none';
                
                // Chat UI Updates
                chatLoginOverlay.style.display = 'flex';
                chatInput.disabled = true;
                chatSendBtn.disabled = true;
            }
        });

        // Send Message Function
        const sendMessage = () => {
            if (!currentUser) return;
            const text = chatInput.value.trim();
            if (text.length === 0) return;

            // Push to Firebase Realtime Database
            push(messagesRef, {
                uid: currentUser.uid,
                name: currentUser.displayName,
                photo: currentUser.photoURL,
                text: text,
                timestamp: serverTimestamp()
            });

            chatInput.value = ''; // clear input
            chatInput.focus();
        };

        chatSendBtn.onclick = sendMessage;
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Receive Messages in Realtime
        onChildAdded(recentMessagesQuery, (snapshot) => {
            const msg = snapshot.val();
            const isMe = currentUser && msg.uid === currentUser.uid;
            
            // Create Message Element
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg-row ${isMe ? 'me' : 'other'}`;
            
            const photoUrl = msg.photo || 'https://via.placeholder.com/32';
            const firstName = msg.name ? msg.name.split(' ')[0] : 'User';

            msgDiv.innerHTML = `
                <img src="${photoUrl}" class="msg-avatar" alt="User">
                <div class="msg-content">
                    ${!isMe ? `<span class="msg-name">${firstName}</span>` : ''}
                    <div class="msg-bubble">${msg.text}</div>
                </div>
            `;
            
            chatMessages.appendChild(msgDiv);
            
            // Auto scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Show Notification Badge if chat is closed
            if (!isChatOpen && !isMe) {
                chatBadge.style.display = 'block';
            }
        });
    </script>
</body>
</html>
