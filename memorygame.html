<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Memory Game Pro</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --card-back: #e94560;
      --card-front: #ffffff;
      --accent: #0f3460;
      --text: #ffffff;
      --success: #4caf50;
      --danger: #f44336;
      --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none; /* Text select na ho */
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden; /* Screen lock karne ke liye */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- Screens Management --- */
    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9);
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    /* --- Home Screen (Dashboard) --- */
    #home-screen h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .subtitle {
      font-size: 1.2rem;
      color: #ccc;
      margin-bottom: 40px;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 300px;
    }

    button {
      padding: 15px 25px;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    button:active { transform: translateY(-1px); }

    .btn-easy { background-color: #2ecc71; color: white; }
    .btn-medium { background-color: #f39c12; color: white; }
    .btn-hard { background-color: #e74c3c; color: white; }

    /* --- Game Screen --- */
    #game-screen {
      justify-content: flex-start; /* HUD upar rahe */
    }

    .hud {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      margin-bottom: 15px;
      backdrop-filter: blur(5px);
    }

    .stat-box {
      font-size: 1.1rem;
      font-weight: bold;
    }

    #mistakes-count { color: var(--danger); }

    .btn-back {
      padding: 8px 15px;
      font-size: 0.9rem;
      background-color: #555;
      color: white;
    }

    /* --- Game Board (Responsive & Locked) --- */
    .board-container {
      flex: 1; /* Bachi hui height le le */
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .board {
      display: grid;
      gap: 10px;
      perspective: 1000px;
      /* Max sizes taaki screen se bahar na jaye */
      max-width: 100%;
      max-height: calc(100vh - 120px); 
    }

    /* --- Cards styling --- */
    .card {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Smooth jumpy effect */
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .card.flip {
      transform: rotateY(180deg);
      cursor: default;
    }

    .card .front, .card .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.1);
    }

    .card .back {
      background-color: var(--card-back);
      color: white;
      font-size: 2rem;
    }

    .card .front {
      background-color: var(--card-front);
      transform: rotateY(180deg);
    }

    /* Matched animation */
    .card.matched {
      animation: matchPop 0.4s ease-in-out;
    }

    @keyframes matchPop {
      0% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
      100% { transform: rotateY(180deg) scale(1); opacity: 0.7; }
    }

    /* Mobile scaling logic */
    /* Dynamic font size based on card size set in JS */
    .card-emoji {
      font-size: var(--emoji-size, 2rem);
    }

    /* --- End Screen (Win/Loss) --- */
    #end-screen h2 { font-size: 3rem; margin-bottom: 20px; }
    #end-screen p { font-size: 1.5rem; margin-bottom: 30px; }
    .win-text { color: var(--success); }
    .lose-text { color: var(--danger); }

  </style>
</head>
<body>

  <div class="screen active" id="home-screen">
    <h1>🧠 Dimaag Chalao</h1>
    <p class="subtitle">Mushkil chuno aur shuru karo</p>
    <div class="menu-buttons">
      <button class="btn-easy" onclick="initGame('easy')">Aasaan (4x4)</button>
      <button class="btn-medium" onclick="initGame('medium')">Mushkil (4x5)</button>
      <button class="btn-hard" onclick="initGame('hard')">Bohot Mushkil (5x6)</button>
    </div>
  </div>

  <div class="screen" id="game-screen">
    <div class="hud">
      <button class="btn-back" onclick="showHomeScreen()">⬅ Back</button>
      <div class="stat-box">Galtiyan: <span id="mistakes-count">0</span> / 10</div>
    </div>
    <div class="board-container">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="screen" id="end-screen">
    <h2 id="end-title">Game Over</h2>
    <p id="end-message"></p>
    <button class="btn-easy" onclick="showHomeScreen()">Wapas Home Par</button>
  </div>

  <script>
    // Config
    const MAX_MISTAKES = 10;
    const PEEK_TIME = 2000; // 2 seconds tak cards dikhenge shuru mein

    // Emojis Pool
    const allEmojis = ['🍎', '🍌', '🍇', '🍉', '🍓', '🥑', '🍒', '🍍', '🥝', '🥭', '🥥', '🍊', '🍋', '🍐', '🫐'];

    // Level Settings
    const levels = {
      easy: { rows: 4, cols: 4, pairs: 8, cardSize: 70 }, // Size in px for mobile
      medium: { rows: 4, cols: 5, pairs: 10, cardSize: 60 },
      hard: { rows: 5, cols: 6, pairs: 15, cardSize: 50 }
    };

    // Game State
    let currentLevel;
    let cardsArray = [];
    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;
    let mistakes = 0;
    let matchedPairs = 0;
    let isPeeking = false;

    // Elements
    const homeScreen = document.getElementById('home-screen');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const board = document.getElementById('board');
    const mistakesDisplay = document.getElementById('mistakes-count');

    // --- Screen Navigation ---
    function setActiveScreen(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function showHomeScreen() {
      setActiveScreen(homeScreen);
    }

    // --- Game Logic ---
    function initGame(difficulty) {
      currentLevel = levels[difficulty];
      resetGameState();
      setupBoard();
      setActiveScreen(gameScreen);
      
      // Start with Peek
      setTimeout(startPeek, 500); // Thoda delay screen transition ke baad
    }

    function resetGameState() {
      board.innerHTML = '';
      mistakes = 0;
      matchedPairs = 0;
      mistakesDisplay.textContent = mistakes;
      hasFlippedCard = false;
      lockBoard = true; // Peek khatam hone tak lock
      firstCard = null;
      secondCard = null;
    }

    function setupBoard() {
      // 1. Grid structure set karein
      board.style.gridTemplateColumns = `repeat(${currentLevel.cols}, 1fr)`;
      
      // 2. Emojis select aur shuffle karein
      let selectedEmojis = allEmojis.slice(0, currentLevel.pairs);
      cardsArray = [...selectedEmojis, ...selectedEmojis];
      shuffle(cardsArray);

      // 3. Card size calculate karein dynamically taaki screen mein fit ho
      // CSS variables ka use karenge smooth scaling ke liye
      const containerWidth = document.querySelector('.board-container').offsetWidth - 40; // padding
      const containerHeight = document.querySelector('.board-container').offsetHeight - 40;
      
      // Calculate best fit card size
      let cellW = Math.floor(containerWidth / currentLevel.cols) - 10; // 10 is gap
      let cellH = Math.floor(containerHeight / currentLevel.rows) - 10;
      let optimalSize = Math.min(cellW, cellH, 100); // Max size 100px
      
      board.style.setProperty('--emoji-size', (optimalSize * 0.5) + 'px');

      // 4. Create HTML
      cardsArray.forEach(emoji => {
        const cardElement = document.createElement('div');
        cardElement.classList.add('card');
        cardElement.style.width = `${optimalSize}px`;
        cardElement.style.height = `${optimalSize}px`;
        cardElement.dataset.emoji = emoji;

        cardElement.innerHTML = `
          <div class="front"><span class="card-emoji">${emoji}</span></div>
          <div class="back">?</div>
        `;

        cardElement.addEventListener('click', flipCard);
        board.appendChild(cardElement);
      });
    }

    // Shuru mein saare cards dikhana
    function startPeek() {
      isPeeking = true;
      document.querySelectorAll('.card').forEach(card => card.classList.add('flip'));
      
      setTimeout(() => {
        document.querySelectorAll('.card').forEach(card => card.classList.remove('flip'));
        isPeeking = false;
        lockBoard = false; // Ab player khel sakta hai
      }, PEEK_TIME);
    }

    function flipCard() {
      if (lockBoard || isPeeking || this.classList.contains('flip') || this.classList.contains('matched')) return;

      this.classList.add('flip');

      if (!hasFlippedCard) {
        hasFlippedCard = true;
        firstCard = this;
        return;
      }

      secondCard = this;
      checkForMatch();
    }

    function checkForMatch() {
      let isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;

      if (isMatch) {
        handleMatch();
      } else {
        handleNoMatch();
      }
    }

    function handleMatch() {
      lockBoard = true;
      // Smooth match animation ke liye thoda delay
      setTimeout(() => {
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');
        matchedPairs++;
        resetBoardAfterTurn();
        checkWinCondition();
      }, 300);
    }

    function handleNoMatch() {
      lockBoard = true;
      mistakes++;
      mistakesDisplay.textContent = mistakes;

      // Mistake vibration (sirf mobile support par)
      if (navigator.vibrate) navigator.vibrate(100);

      if (mistakes >= MAX_MISTAKES) {
        setTimeout(gameOver, 1000); // Loses
      } else {
        // 1 second baad unflip (smooth animation)
        setTimeout(() => {
          firstCard.classList.remove('flip');
          secondCard.classList.remove('flip');
          resetBoardAfterTurn();
        }, 1200);
      }
    }

    function resetBoardAfterTurn() {
      [hasFlippedCard, lockBoard] = [false, false];
      [firstCard, secondCard] = [null, null];
    }

    function checkWinCondition() {
      if (matchedPairs === currentLevel.pairs) {
        setTimeout(() => gameFinished(true), 1000);
      }
    }

    function gameOver() {
      gameFinished(false);
    }

    function gameFinished(isWin) {
      const title = document.getElementById('end-title');
      const msg = document.getElementById('end-message');
      
      if (isWin) {
        title.textContent = "Jeet Gaye! 🎉";
        title.className = "win-text";
        msg.textContent = `Aapne sirf ${mistakes} galtiyan ki.`;
      } else {
        title.textContent = "Haar Gaye! 😢";
        title.className = "lose-text";
        msg.textContent = `10 galtiyan ho gayi thin. Fir koshish karein?`;
        // Show remaining cards
        document.querySelectorAll('.card:not(.flip)').forEach(card => card.classList.add('flip'));
      }
      
      setActiveScreen(endScreen);
    }

    // Shuffle utility
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    // Handle screen resize to keep it locked properly
    window.addEventListener('resize', () => {
      if (gameScreen.classList.contains('active')) {
        // Simple trick to refresh card sizing on rotate/resize
        const currentDiff = Object.keys(levels).find(key => levels[key] === currentLevel);
        setupBoard(); 
        // Note: Peek nahi chalega resize par, direct cards dikhenge.
        document.querySelectorAll('.card').forEach((card, index) => {
             // Redraw matched cards
             // Complex state handling not added here for simplicity, 
             // ideally games should handle rotation state.
        });
      }
    });

  </script>
</body>
</html>
